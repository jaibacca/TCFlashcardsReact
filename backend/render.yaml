services:
  # Backend API Service
  - type: web
    name: tcflashcards-backend
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: tcflashcards-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false

  # PostgreSQL Database
databases:
  - name: tcflashcards-db
    databaseName: chinese_flashcards
    user: postgres
    region: oregon
    plan: free
